name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rouge-score pandas numpy python-dotenv pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=long
        env:
          PYTHONPATH: ${{ github.workspace }}
          MISTRAL_API_KEY: dummy
          OPENAI_API_KEY: dummy
          ANTHROPIC_API_KEY: dummy

      - name: Lint with ruff (non-blocking)
        if: always()
        run: pip install ruff && ruff check . --ignore E501,E402,F401 || true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
